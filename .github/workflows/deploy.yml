name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate HTML
        run: |
          echo "Validating HTML files..."
          for file in $(find . -name "*.html" -not -path "./.git/*"); do
            if grep -q "<!DOCTYPE html>" "$file"; then
              echo "  [OK] $file"
            else
              echo "  [WARN] $file missing DOCTYPE"
            fi
          done
          echo "HTML validation complete."

      - name: Deploy to Cloudflare Pages
        id: cloudflare_deploy
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=alexa-amundson-portfolio

      - name: Add deployment comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Deployment Preview\n\nBuild completed successfully!\n\n**Preview URL:** ${{ steps.cloudflare_deploy.outputs.deployment-url }}\n\nValidation: **Passed**`
            })

      - name: Notify success
        if: success()
        run: |
          echo "Deployment successful!"
          echo "URL: ${{ steps.cloudflare_deploy.outputs.deployment-url }}"
