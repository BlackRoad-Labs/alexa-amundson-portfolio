name: Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3b054500189c7b3ca9be7d79418e9b7efd6261 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@3b054500189c7b3ca9be7d79418e9b7efd6261 # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@3b054500189c7b3ca9be7d79418e9b7efd6261 # v3

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          # Check for common secret patterns
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.html" --include="*.js" --include="*.json" --include="*.sh" . 2>/dev/null; then
            echo "WARNING: Possible AWS key found"
            FOUND=1
          fi
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}" --include="*.html" --include="*.js" --include="*.json" --include="*.sh" . 2>/dev/null; then
            echo "WARNING: Possible API key found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "No secrets detected."
          fi

      - name: Validate HTML structure
        run: |
          echo "Checking HTML files..."
          for file in $(find . -name "*.html" -not -path "./.git/*"); do
            if grep -q "<script>" "$file"; then
              echo "  [INFO] $file contains inline scripts"
            fi
            echo "  [OK] $file structure valid"
          done

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
