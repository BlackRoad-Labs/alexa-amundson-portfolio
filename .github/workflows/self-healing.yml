name: Self-Healing Monitor

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy", "Deploy to Cloudflare Pages"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Deployment Health
        id: health
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
          if [ -z "$DEPLOY_URL" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No DEPLOY_URL configured, skipping health check"
            exit 0
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$DEPLOY_URL" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check for $DEPLOY_URL: HTTP $STATUS"

      - name: Check HTML Files Integrity
        run: |
          echo "Verifying local HTML files..."
          ERRORS=0
          for file in $(find . -name "*.html" -not -path "./.git/*"); do
            if [ ! -s "$file" ]; then
              echo "  [ERROR] $file is empty"
              ERRORS=$((ERRORS + 1))
            else
              echo "  [OK] $file ($(wc -c < "$file") bytes)"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS empty HTML files"
            exit 1
          fi
          echo "All HTML files verified."

      - name: Verify Links in index.html
        run: |
          echo "Checking internal links in index.html..."
          BROKEN=0
          for link in $(grep -oP 'href="(?!http|mailto|#)([^"]+)"' index.html | sed 's/href="//;s/"//'); do
            if [ ! -f "$link" ]; then
              echo "  [BROKEN] $link"
              BROKEN=$((BROKEN + 1))
            else
              echo "  [OK] $link"
            fi
          done

          if [ "$BROKEN" -gt 0 ]; then
            echo "Found $BROKEN broken internal links"
          else
            echo "All internal links valid."
          fi

      - name: Create Issue on Health Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-health'
            });
            // Only create if no existing open health issue
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Deployment Health Check Failed',
                body: `Health check returned HTTP ${{ steps.health.outputs.status }}.\n\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTime: ${new Date().toISOString()}`,
                labels: ['deployment-health', 'automated']
              });
            }
